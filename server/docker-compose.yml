services:
  postgres:
    image: postgres:16-alpine
    container_name: gravity_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GRAVITY_POSTGRES_DB:-gravity_workspace}
      POSTGRES_USER: ${GRAVITY_POSTGRES_USER:-gravity_user}
      POSTGRES_PASSWORD: ${GRAVITY_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - gravity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAVITY_POSTGRES_USER:-gravity_user} -d ${GRAVITY_POSTGRES_DB:-gravity_workspace}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gravity_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass ${GRAVITY_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${GRAVITY_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gravity_postgres_data:
