services:
  postgres:
    image: postgres:16-alpine
    container_name: gravity_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: gravity_workspace
      POSTGRES_USER: gravity_user
      POSTGRES_PASSWORD: secure_dev_password_change_me_in_prod
    ports:
      - "5432:5432"
    volumes:
      - gravity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravity_user -d gravity_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gravity_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass secure_dev_password_change_me_in_prod
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secure_dev_password_change_me_in_prod", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gravity_postgres_data:
