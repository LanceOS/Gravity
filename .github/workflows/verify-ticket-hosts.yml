name: Verify VITE_ALLOWED_TICKET_HOSTS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-ticket-hosts:
    name: Verify allowed ticket hosts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VITE_ALLOWED_TICKET_HOSTS is set
        env:
          # Allow presence via either workflow env or repository secret
          VITE_ALLOWED_TICKET_HOSTS_SECRET: ${{ secrets.VITE_ALLOWED_TICKET_HOSTS }}
        run: |
          set -euo pipefail
          if [ -n "${VITE_ALLOWED_TICKET_HOSTS:-}" ]; then
            echo "VITE_ALLOWED_TICKET_HOSTS is set via workflow env"
            exit 0
          fi

          if [ -n "${VITE_ALLOWED_TICKET_HOSTS_SECRET:-}" ]; then
            echo "VITE_ALLOWED_TICKET_HOSTS is set via repository secret"
            exit 0
          fi

          echo "Error: VITE_ALLOWED_TICKET_HOSTS is not set."
          echo "Set it as a repository secret or in the workflow environment before merging to main."
          exit 1
