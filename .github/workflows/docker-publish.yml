name: Build and publish server Docker image

on:
  push:
    branches:
    - main
    paths:
    - 'server/**'
    - 'client/**'
    - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU (for multi-arch)
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get package version
      run: echo "PACKAGE_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./server/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/gravity-app:latest
          ghcr.io/${{ github.repository_owner }}/gravity-app:${{ env.PACKAGE_VERSION }}
          ghcr.io/${{ github.repository_owner }}/gravity-app:${{ github.sha }}
        platforms: linux/amd64,linux/arm64
