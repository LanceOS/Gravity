name: gravitycopy

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${GRAVITY_POSTGRES_CONTAINER:-gravity_postgres}
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${GRAVITY_POSTGRES_USER:-gravity_user}
      # POSTGRES_PASSWORD will be supplied via env_file (../.env) to avoid
      # interpolation issues when running compose from the docker/ directory.
      POSTGRES_DB: ${GRAVITY_POSTGRES_DB:-gravity_workspace}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAVITY_POSTGRES_USER:-gravity_user} -d ${GRAVITY_POSTGRES_DB:-gravity_workspace}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gravity_internal

  redis:
    image: redis:7-alpine
    container_name: ${GRAVITY_REDIS_CONTAINER:-gravity_redis}
    env_file:
      - ../.env
    command: >
      sh -c 'if [ -n "$$GRAVITY_REDIS_PASSWORD" ]; then redis-server --requirepass "$$GRAVITY_REDIS_PASSWORD"; else redis-server; fi'
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$GRAVITY_REDIS_PASSWORD\" ]; then redis-cli -a \"$$GRAVITY_REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      timeout: 5s
      retries: 5
    networks:
      - gravity_internal

  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
    # Use the consolidated repository-level .env
    env_file:
      - ../.env
    container_name: ${GRAVITY_BACKEND_CONTAINER:-gravity_app_server}
    environment:
      # Important: load sensitive values from ../.env via `env_file`.
      # Avoid interpolating DATABASE_URL and secrets in the compose file
      # so the container receives the values directly from the env_file.
      BETTER_AUTH_BASE_URL: ${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:5173}
      TRUSTED_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:5173},${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:8080}
      OLLAMA_DEFAULT_ENDPOINT: ${OLLAMA_DEFAULT_ENDPOINT:-http://host.docker.internal:11434}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${GRAVITY_BACKEND_PORT:-8080}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gravity_internal

  frontend:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: ${GRAVITY_FRONTEND_CONTAINER:-gravity_frontend}
    environment:
      BACKEND_UPSTREAM: http://backend:8080
    ports:
      - "${GRAVITY_FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started
    networks:
      - gravity_internal

volumes:
  pgdata:

networks:
  gravity_internal:
    driver: bridge