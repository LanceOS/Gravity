name: gravitycopy

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${GRAVITY_POSTGRES_CONTAINER:-gravity_postgres}
    environment:
      POSTGRES_USER: gravity_user
      POSTGRES_PASSWORD: secure_dev_password_change_me_in_prod
      POSTGRES_DB: gravity_workspace
    ports:
      - "${GRAVITY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravity_user -d gravity_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${GRAVITY_REDIS_CONTAINER:-gravity_redis}
    command: redis-server --requirepass ${GRAVITY_REDIS_PASSWORD:?Set GRAVITY_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${GRAVITY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${GRAVITY_REDIS_PASSWORD:?Set GRAVITY_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: ${GRAVITY_BACKEND_CONTAINER:-gravity_app_server}
    environment:
      DATABASE_URL: postgresql://gravity_user:secure_dev_password_change_me_in_prod@postgres:5432/gravity_workspace
      BETTER_AUTH_SECRET: change-me-before-production
      BETTER_AUTH_BASE_URL: ${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:5173}
      TRUSTED_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:5173},${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:8080}
      OLLAMA_DEFAULT_ENDPOINT: http://host.docker.internal:11434
      NODE_ENV: production
      PORT: 8080
      REDIS_URL: redis://default:${GRAVITY_REDIS_PASSWORD:-secure_dev_password_change_me_in_prod}@redis:6379
      REDIS_ENABLED: "true"
    ports:
      - "${GRAVITY_BACKEND_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: ${GRAVITY_FRONTEND_CONTAINER:-gravity_frontend}
    environment:
      BACKEND_UPSTREAM: http://backend:8080
    ports:
      - "${GRAVITY_FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata: