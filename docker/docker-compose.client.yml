name: gravitycopy-client

services:
  frontend:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: gravity-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - BACKEND_UPSTREAM=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"