services:
  postgres:
    image: postgres:16-alpine
    container_name: ${GRAVITY_POSTGRES_CONTAINER:-gravity_postgres}
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${GRAVITY_POSTGRES_USER:-gravity_user}
      POSTGRES_DB: ${GRAVITY_POSTGRES_DB:-gravity_workspace}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAVITY_POSTGRES_USER:-gravity_user} -d ${GRAVITY_POSTGRES_DB:-gravity_workspace}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gravity_internal

  redis:
    image: redis:7-alpine
    container_name: ${GRAVITY_REDIS_CONTAINER:-gravity_redis}
    env_file:
      - ../.env
    command: >
      sh -c 'if [ -n "$$GRAVITY_REDIS_PASSWORD" ]; then redis-server --requirepass "$$GRAVITY_REDIS_PASSWORD"; else redis-server; fi'
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$GRAVITY_REDIS_PASSWORD\" ]; then redis-cli -a \"$$GRAVITY_REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      timeout: 5s
      retries: 5
    networks:
      - gravity_internal

  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: development
    env_file:
      - ../.env
    container_name: ${GRAVITY_BACKEND_CONTAINER:-gravity_app_server}
    environment:
      NODE_ENV: development
      PORT: ${GRAVITY_BACKEND_PORT:-8080}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ../server/src
          target: /app/server/src
          ignore:
            - node_modules/
            - dist/
            - coverage/
            - tests/
        - action: rebuild
          path: ../server/package.json
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ../server/tsconfig.json
        - action: sync
          path: ../library
          target: /app/library
          ignore:
            - node_modules/
            - dist/
    networks:
      gravity_internal:
        aliases:
          - backend

  frontend:
    build:
      context: ..
      dockerfile: client/Dockerfile
      target: development
    container_name: ${GRAVITY_FRONTEND_CONTAINER:-gravity_frontend}
    environment:
      BACKEND_UPSTREAM: http://gravity_app_server:8080
      NODE_ENV: development
    command: ["sh","-c","npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ../client/src
          target: /app/client/src
          ignore:
            - node_modules/
            - dist/
            - coverage/
            - src/test/
            - tests/
        - action: rebuild
          path: ../client/package.json
        - action: rebuild
          path: ../client/tsconfig.json
        - action: sync
          path: ../library
          target: /app/library
          ignore:
            - node_modules/
            - dist/
    networks:
      - gravity_internal

volumes:
  pgdata:

networks:
  gravity_internal:
    driver: bridge
