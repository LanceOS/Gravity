services:
  postgres:
    image: postgres:16-alpine
    container_name: ${GRAVITY_POSTGRES_CONTAINER:-gravity_postgres}
    environment:
      POSTGRES_USER: gravity_user
      POSTGRES_PASSWORD: secure_dev_password_change_me_in_prod
      POSTGRES_DB: gravity_workspace
    ports:
      - "${GRAVITY_POSTGRES_PORT:-35432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravity_user -d gravity_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ${GRAVITY_BACKEND_CONTAINER:-gravity_app_server}
    environment:
      DATABASE_URL: postgresql://gravity_user:secure_dev_password_change_me_in_prod@postgres:5432/gravity_workspace
      BETTER_AUTH_SECRET: change-me-before-production
      BETTER_AUTH_BASE_URL: ${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:38080}
      CORS_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:33100}
      TRUSTED_ORIGINS: ${GRAVITY_FRONTEND_PUBLIC_URL:-http://localhost:33100},${GRAVITY_BACKEND_PUBLIC_URL:-http://localhost:38080}
      OLLAMA_DEFAULT_ENDPOINT: http://host.docker.internal:11434
      NODE_ENV: production
      PORT: 8080
    ports:
      - "${GRAVITY_BACKEND_PORT:-38080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ${GRAVITY_FRONTEND_CONTAINER:-gravity_frontend}
    environment:
      BACKEND_UPSTREAM: http://backend:8080
    ports:
      - "${GRAVITY_FRONTEND_PORT:-33100}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata: