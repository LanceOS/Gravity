services:
  postgres:
    image: postgres:16-alpine
    container_name: gravity_postgres
    environment:
      POSTGRES_USER: gravity_user
      POSTGRES_PASSWORD: secure_dev_password_change_me_in_prod
      POSTGRES_DB: gravity_workspace
    ports:
      - "35432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravity_user -d gravity_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gravity_app_server
    environment:
      DATABASE_URL: postgresql://gravity_user:secure_dev_password_change_me_in_prod@postgres:5432/gravity_workspace
      BETTER_AUTH_SECRET: change-me-before-production
      BETTER_AUTH_BASE_URL: http://localhost:38080
      CORS_ORIGINS: http://localhost:33100
      TRUSTED_ORIGINS: http://localhost:33100,http://localhost:38080
      OLLAMA_DEFAULT_ENDPOINT: http://host.docker.internal:11434
      NODE_ENV: production
      PORT: 8080
    ports:
      - "38080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: gravity_frontend
    environment:
      BACKEND_UPSTREAM: http://backend:8080
    ports:
      - "33100:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata: